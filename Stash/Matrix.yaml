# 配置名称: Stash 配置
# 配置作者: Centralmatrix3
# 更新时间: 26-04-05 00:00

# [订阅信息]
subscribe-url: https://your-service-provider

# [订阅节点]
proxy-providers:
  subscribe:
    url: https://your-service-provider
    interval: 86400
    benchmark-url: http://cp.cloudflare.com/generate_204
    benchmark-timeout: 5

# [通用设置]
mode: rule
log-level: info

# [DNS设置]
dns:
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fake-ip-filter:
    - '*.lan'
    - '+.local'
  skip-cert-verify: true

# [策略组]
proxy-groups:
  - name: 自行选择
    type: select
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/Static.png
    hidden: null
    include-all: true
    filter: ^
    interval: 1800
    lazy: true

  - name: 苹果服务
    type: select
    icon: https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/Apple-v2.png
    hidden: null
    proxies:
      - DIRECT
      - REJECT
      - 自行选择
      - 自动选择
      - 香港节点
      - 台湾节点
      - 日本节点
      - 韩国节点
      - 狮城节点
      - 美国节点

