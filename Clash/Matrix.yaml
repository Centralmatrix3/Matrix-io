# [本地规则]
rules:
  - RULE-SET,规则修正,DIRECT
  - RULE-SET,广告拦截,REJECT
  - RULE-SET,港台媒体,港台媒体
  - RULE-SET,国内媒体,国内媒体
  - RULE-SET,国外媒体,国外媒体
  - RULE-SET,国外网站,国外网站
  - RULE-SET,苹果服务,苹果服务
  - RULE-SET,局域网络,DIRECT
  - RULE-SET,国内网站,DIRECT
  - MATCH,黑白名单

# [远程规则]
rule-providers:
  规则修正:
