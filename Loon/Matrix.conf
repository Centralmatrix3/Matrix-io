# 配置名称: Loon 配置
# 配置作者: Centralmatrix3
# 更新时间: 26-04-05 00:00

[General]
# 测试超时时间
test-timeout = 5

# 直连网络测试
internet-test-url = http://taobao.com/

# 代理策略测试
proxy-test-url = http://cp.cloudflare.com/generate_204

# 网络接口模式
interface-mode = auto

# 策略变更中断
disconnect-on-policy-change = true

# 自定义数据库
geoip-url = https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb

# 自定义解析器
resource-parser = https://raw.githubusercontent.com/sub-store-org/Sub-Store/release/sub-store-parser.loon.min.js

# 域名拦截模式
domain-reject-mode = DNS

# DNS拦截模式
dns-reject-mode = LoopbackIP

# SNI辅助匹配
sni-sniffing = true

# UDP回退策略
udp-fallback-mode = REJECT

# 常规DNS服务器
dns-server = 223.5.5.5, 119.29.29.29

# 加密DNS服务器
doh-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query

# IP查询模式
ip-mode = ipv4-only

# 网络共享
allow-wifi-access = true

# 端口设置
wifi-access-http-port = 7222
wifi-access-socks5-port = 7221

[Remote Proxy]
# 远程订阅

[Remote Filter]
# 全部节点
全部 = NameRegex, FilterKey="^"

# 香港节点
香港 = NameRegex, FilterKey="香港|港|HK|🇭🇰|(?i)Hong"

# 台湾节点
台湾 = NameRegex, FilterKey="台湾|台|TW|🇹🇼|(?i)Taiwan"

# 日本节点
日本 = NameRegex, FilterKey="日本|日|JP|🇯🇵|(?i)Japan"

# 韩国节点
韩国 = NameRegex, FilterKey="韩国|韩|KR|🇰🇷|(?i)Korea"

# 狮城节点
狮城 = NameRegex, FilterKey="新加坡|狮|SG|🇸🇬|(?i)Singapore"

# 美国节点
美国 = NameRegex, FilterKey="美国|美|US|🇺🇸|(?i)States"

[Proxy Group]
# 自行选择
自行选择 = select, 全部, url=http://cp.cloudflare.com/generate_204, img-url=https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/Static.png

# 苹果服务
苹果服务 = select, DIRECT, REJECT, 自行选择, 自动选择, 香港节点, 台湾节点, 日本节点, 韩国节点, 狮城节点, 美国节点, url=http://cp.cloudflare.com/generate_204, img-url=https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Gallery/Color/Apple-v2.png

