name: Build

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0,12 * * *"

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Shanghai"
      SING_BOX_VERSION: "1.12.9"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5.0.0
        with:
          repository: Centralmatrix3/Matrix-io
          path: Matrix-io-repo
          ref: master

      - name: Build
        run: |
          curl -fsSL -o "Build.py" "https://raw.githubusercontent.com/Centralmatrix3/Scripts/master/Source/Build.py"
          curl -fsSL -o "Build.sh" "https://raw.githubusercontent.com/Centralmatrix3/Scripts/master/Source/Build.sh"
          bash "Build.sh"
          for file in Matrix-io-repo/*/Ruleset/*.{list,yaml,json}; do
            [ ! -f "$file" ] && echo "$file not found." && continue
            sed -i -E '/^[[:space:]]*(#|$)/d' "$file"
          done

      - name: Egern
        run: |
          for file in Matrix-io-repo/Egern/Ruleset/*.yaml; do
            [ ! -f "$file" ] && echo "$file not found." && continue
            rule_names="$(basename "$file" .yaml)"
            rule_count="$(wc -l < "$file")"
            python "Build.py" Egern "$file"
            tmpfile="$(mktemp)"
            { echo "# 规则名称: $rule_names"
              echo "# 规则统计: $rule_count"
              echo
              cat "$file"
            } > "$tmpfile" && mv "$tmpfile" "$file"
          done

      - name: QuantumultX
        run: |
          for file in Matrix-io-repo/QuantumultX/Ruleset/*.list; do
            [ ! -f "$file" ] && echo "$file not found." && continue
            rule_names="$(basename "$file" .list)"
            rule_count="$(wc -l < "$file")"
            python "Build.py" QuantumultX "$file"
            tmpfile="$(mktemp)"
            { echo "# 规则名称: $rule_names"
              echo "# 规则统计: $rule_count"
              echo
              cat "$file"
            } > "$tmpfile" && mv "$tmpfile" "$file"
          done

      - name: Singbox
        run: |
          curl -fsSL -o "sing-box.tar.gz" "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          tar -xzf "sing-box.tar.gz"
          chmod +x "sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box"
          sudo mv "sing-box-${SING_BOX_VERSION}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version
          for file in Matrix-io-repo/Sing-box/Ruleset/*.json; do
            [ ! -f "$file" ] && echo "$file not found." && continue
            rule_names="$(basename "$file" .json)"
            rule_count="$(wc -l < "$file")"
            python "Build.py" Singbox "$file"
            sing-box rule-set compile "$file" -o "${file%.json}.srs"
          done
          rm -rf "sing-box.tar.gz" "sing-box-${SING_BOX_VERSION}-linux-amd64"

      - name: Stash
        run: |
          for file in Matrix-io-repo/{Clash,Stash}/Ruleset/*.yaml; do
            [ ! -f "$file" ] && echo "$file not found." && continue
            rule_names="$(basename "$file" .yaml)"
            rule_count="$(wc -l < "$file")"
            python "Build.py" Stash "$file"
            tmpfile="$(mktemp)"
            { echo "# 规则名称: $rule_names"
              echo "# 规则统计: $rule_count"
              echo
              cat "$file"
            } > "$tmpfile" && mv "$tmpfile" "$file"
          done

      - name: Surge
        run: |
          for file in Matrix-io-repo/{Loon,Shadowrocket,Surge}/Ruleset/*.list; do
            [ ! -f "$file" ] && echo "$file not found." && continue
            rule_names="$(basename "$file" .list)"
            rule_count="$(wc -l < "$file")"
            tmpfile="$(mktemp)"
            { echo "# 规则名称: $rule_names"
              echo "# 规则统计: $rule_count"
              echo
              cat "$file"
            } > "$tmpfile" && mv "$tmpfile" "$file"
          done

      - name: Push Update
        run: |
          cd Matrix-io-repo
          if [[ -n $(git status -s) ]]; then
            git config --local user.email "${{ github.actor }}@users.noreply.github.com"
            git config --local user.name "${{ github.actor }}"
            git add -A
            git commit -m "$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin master
            git push origin HEAD:master
          else
            echo "No Repository Update Detected."
          fi

      - name: Cleanup Workflow
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2